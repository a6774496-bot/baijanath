<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBSS Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

    <header class="bg-blue-700 text-white p-4 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold">Shree Baijanath Secondary School - Admin Dashboard</h1>
            <span class="bg-blue-800 px-3 py-1 rounded text-sm font-semibold">Authorized Only</span>
        </div>
    </header>

    <main class="container mx-auto my-8 p-4 grid grid-cols-1 md:grid-cols-2 gap-8">

        <section class="bg-white p-6 rounded-lg shadow border-t-4 border-amber-500">
            <h2 class="text-lg font-bold text-gray-800 mb-4 flex items-center">📢 नयाँ सूचना (Notice) थप्नुहोस्</h2>
            <form id="noticeForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">सूचनाको शीर्षक</label>
                    <input type="text" id="noticeTitle" required class="mt-1 block w-full p-2 border border-gray-300 rounded shadow-sm focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">मिति छान्नुहोस्</label>
                    <input type="date" id="noticeDate" required class="mt-1 block w-full p-2 border border-gray-300 rounded shadow-sm focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">सूचनाको विस्तृत विवरण (Content)</label>
                    <textarea id="noticeContent" rows="4" required class="mt-1 block w-full p-2 border border-gray-300 rounded shadow-sm focus:ring-blue-500 focus:border-blue-500"></textarea>
                </div>
                <button type="submit" class="w-full bg-amber-500 hover:bg-amber-600 text-white font-bold py-2 px-4 rounded transition shadow">Publish Notice</button>
            </form>
        </section>

        <section class="bg-white p-6 rounded-lg shadow border-t-4 border-purple-600">
            <h2 class="text-lg font-bold text-gray-800 mb-4">🏃 मुख्य सूचना (Scrolling Ticker) फेर्नुहोस्</h2>
            <form id="tickerForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">वेबसाइटमा हिँड्ने सूचना टेक्स्ट</label>
                    <input type="text" id="tickerText" required placeholder="जस्तै: नयाँ भर्ना खुल्यो..." class="mt-1 block w-full p-2 border border-gray-300 rounded shadow-sm focus:ring-blue-500 focus:border-blue-500">
                </div>
                <button type="submit" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-2 px-4 rounded transition shadow">Update Ticker</button>
            </form>
        </section>

        <section class="bg-white p-6 rounded-lg shadow border-t-4 border-blue-600">
            <h2 class="text-lg font-bold text-gray-800 mb-4">🎓 विद्यार्थीको नयाँ रिजल्ट थप्नुहोस्</h2>
            <form id="resultForm" class="space-y-4 grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div class="sm:col-span-2">
                    <label class="block text-sm font-medium text-gray-700">विद्यार्थीको नाम</label>
                    <input type="text" id="studentName" required class="mt-1 block w-full p-2 border border-gray-300 rounded shadow-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">सिम्बोल नम्बर</label>
                    <input type="text" id="symbol" required class="mt-1 block w-full p-2 border border-gray-300 rounded shadow-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">कक्षा</label>
                    <input type="text" id="class" required placeholder="11 वा 12" class="mt-1 block w-full p-2 border border-gray-300 rounded shadow-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">English GPA</label>
                    <input type="text" id="english" required class="mt-1 block w-full p-2 border border-gray-300 rounded shadow-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Math GPA</label>
                    <input type="text" id="math" required class="mt-1 block w-full p-2 border border-gray-300 rounded shadow-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Science GPA</label>
                    <input type="text" id="science" required class="mt-1 block w-full p-2 border border-gray-300 rounded shadow-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Nepali GPA</label>
                    <input type="text" id="nepali" required class="mt-1 block w-full p-2 border border-gray-300 rounded shadow-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Final GPA</label>
                    <input type="text" id="gpa" required class="mt-1 block w-full p-2 border border-gray-300 rounded shadow-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">नतिजा स्थिति</label>
                    <select id="status" class="mt-1 block w-full p-2 border border-gray-300 rounded shadow-sm">
                        <option value="Passed">Passed</option>
                        <option value="Withheld">Withheld</option>
                        <option value="Failed">Failed</option>
                    </select>
                </div>
                <div class="sm:col-span-2">
                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded transition shadow">Add Result</button>
                </div>
            </form>
        </section>

        <section class="bg-white p-6 rounded-lg shadow border-t-4 border-green-600">
            <h2 class="text-lg font-bold text-gray-800 mb-4">👨‍🏫 नयाँ शिक्षक विवरण थप्नुहोस्</h2>
            <form id="teacherForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">शिक्षकको पूरा नाम</label>
                    <input type="text" id="teacherName" required class="mt-1 block w-full p-2 border border-gray-300 rounded shadow-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">पद (Designation)</label>
                    <input type="text" id="designation" required placeholder="जस्तै: Principal, Computer Teacher" class="mt-1 block w-full p-2 border border-gray-300 rounded shadow-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">फोटोको लिङ्क (Image URL)</label>
                    <input type="url" id="photoUrl" required placeholder="https://example.com/photo.jpg" class="mt-1 block w-full p-2 border border-gray-300 rounded shadow-sm">
                </div>
                <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded transition shadow">Add Teacher</button>
            </form>
        </section>

    </main>

    <script>
    const webAppUrl = "https://script.google.com/macros/s/AKfycbzQJC7i7BZ8GDGAButj2CiYE6bc4-ccVV6zwzXVgEf9LdejNEpKn6UqVLxqA89NvdaXhA/exec";

    // १. नोटिस सेभ गर्ने
    document.getElementById('noticeForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = this.querySelector('button'); btn.innerText = "Publishing..."; btn.disabled = true;
        const d = new Date(document.getElementById('noticeDate').value);
        const months = ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"];
        
        fetch(webAppUrl, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({
                action: "addNotice",
                title: document.getElementById('noticeTitle').value,
                month: months[d.getMonth()] || "NOT",
                day: d.getDate(),
                date: document.getElementById('noticeDate').value,
                content: document.getElementById('noticeContent').value
            })
        }).then(() => { alert('सूचना पब्लिश भयो!'); this.reset(); })
        .finally(() => { btn.innerText = "Publish Notice"; btn.disabled = false; });
    });

    // २. टिकर अपडेट गर्ने
    document.getElementById('tickerForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = this.querySelector('button'); btn.innerText = "Updating..."; btn.disabled = true;
        fetch(webAppUrl, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ action: "updateTicker", tickerText: document.getElementById('tickerText').value })
        }).then(() => { alert('म्युख सूचना अपडेट भयो!'); this.reset(); })
        .finally(() => { btn.innerText = "Update Ticker"; btn.disabled = false; });
    });

    // ३. रिजल्ट थप्ने
    document.getElementById('resultForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = this.querySelector('button'); btn.innerText = "Saving..."; btn.disabled = true;
        fetch(webAppUrl, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({
                action: "addResult",
                symbol: document.getElementById('symbol').value,
                class: document.getElementById('class').value,
                name: document.getElementById('studentName').value,
                english: document.getElementById('english').value,
                math: document.getElementById('math').value,
                science: document.getElementById('science').value,
                nepali: document.getElementById('nepali').value,
                gpa: document.getElementById('gpa').value,
                result: document.getElementById('status').value
            })
        }).then(() => { alert('रिजल्ट सेभ भयो!'); this.reset(); })
        .finally(() => { btn.innerText = "Add Result"; btn.disabled = false; });
    });

    // ४. शिक्षक थप्ने
    document.getElementById('teacherForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = this.querySelector('button'); btn.innerText = "Adding..."; btn.disabled = true;
        fetch(webAppUrl, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({
                action: "updateTeacher",
                name: document.getElementById('teacherName').value,
                designation: document.getElementById('designation').value,
                photoUrl: document.getElementById('photoUrl').value
            })
        }).then(() => { alert('शिक्षक थपियो!'); this.reset(); })
        .finally(() => { btn.innerText = "Add Teacher"; btn.disabled = false; });
    });
    </script>
</body>
</html>
