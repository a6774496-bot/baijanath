<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | SBSS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #1a4a8e; 
            --accent: #d71920; 
            --bg: #f0f2f5; 
            --gold: #D97706;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; margin: 0; }
        .admin-container { max-width: 900px; margin: auto; }
        .box { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin-bottom: 30px; border-top: 5px solid var(--primary); }
        .box.notice-box { border-top-color: var(--gold); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-family: inherit; }
        textarea { resize: vertical; min-height: 80px; grid-column: span 2; }
        button { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 15px; transition: 0.3s; }
        button:hover { background: #133669; transform: scale(1.01); }
        .header { text-align: center; color: var(--primary); margin-bottom: 30px; }
        .btn-teacher { background: #28a745; }
        .btn-teacher:hover { background: #218838; }
        .btn-notice { background: var(--gold); }
        .btn-notice:hover { background: #b45309; }
        .back-btn { display: inline-block; text-decoration: none; color: var(--primary); font-weight: bold; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="admin-container">
    <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> मुख्य साइटमा जानुहोस्</a>
    <div class="header">
        <h1><i class="fas fa-user-shield"></i> एडमिन ड्यासबोर्ड</h1>
        <p>श्री बैजनाथ माध्यमिक विद्यालय - डाटा व्यवस्थापन पोर्टल</p>
    </div>

    <div class="box notice-box">
        <h3><i class="fas fa-bullhorn"></i> मुख्य स्क्रोलिङ सूचना (Ticker) फेर्नुहोस्</h3>
        <form id="tickerForm">
            <div>
                <input type="text" id="tickerText" placeholder="वेबसाइटको माथि हिँड्ने मुख्य सूचना यहाँ लेख्नुहोस्..." required>
            </div>
            <button type="button" id="tickBtn" class="btn-notice" onclick="updateTicker()">टिकर सूचना अपडेट गर्नुहोस</button>
        </form>
    </div>

    <div class="box notice-box">
        <h3><i class="fas fa-clipboard-list"></i> सूचना बोर्डमा नयाँ नोटिस थप्नुहोस् (Notice Board)</h3>
        <form id="noticeForm">
            <div class="grid">
                <input type="text" id="nMonth" placeholder="महिना अंग्रेजीमा (उदा: JUN, MAY)" required>
                <input type="number" id="nDay" placeholder="गते वा दिन (उदा: ११, २८)" required>
                <input type="text" id="nTitle" style="grid-column: span 2;" placeholder="सूचनाको मुख्य शीर्षक" required>
                <textarea id="nContent" placeholder="सूचनाको विस्तृत विवरण यहाँ लेख्नुहोस्..."></textarea>
            </div>
            <button type="button" id="notBtn" class="btn-notice" onclick="submitNotice()">सूचना बोर्डमा पोस्ट गर्नुहोस</button>
        </form>
    </div>

    <div class="box">
        <h3><i class="fas fa-file-invoice"></i> विद्यार्थीको रिजल्ट हाल्नुहोस्</h3>
        <form id="resultForm">
            <div class="grid">
                <input type="text" id="sym" placeholder="सिम्बोल नम्बर (उदा: 101)" required>
                
                <select id="class" required style="margin-top:5px;">
                    <option value="">कक्षा छान्नुहोस्</option>
                    <option value="Nursery">Nursery</option>
                    <option value="LKG">LKG</option>
                    <option value="UKG">UKG</option>
                    <option value="1">Class 1</option>
                    <option value="2">Class 2</option>
                    <option value="3">Class 3</option>
                    <option value="4">Class 4</option>
                    <option value="5">Class 5</option>
                    <option value="6">Class 6</option>
                    <option value="7">Class 7</option>
                    <option value="8">Class 8</option>
                    <option value="9">Class 9</option>
                    <option value="10">Class 10</option>
                    <option value="11">Class 11</option>
                    <option value="12">Class 12</option>
                </select>

                <input type="text" id="name" style="grid-column: span 2;" placeholder="विद्यार्थीको पूरा नाम" required>
                <input type="text" id="eng" placeholder="English (Grade/Marks)">
                <input type="text" id="math" placeholder="Math (Grade/Marks)">
                <input type="text" id="sci" placeholder="Science (Grade/Marks)">
                <input type="text" id="nep" placeholder="Nepali (Grade/Marks)">
                <input type="text" id="gpa" placeholder="GPA / Percentage (उदा: 3.6 वा 85%)" required>
                <input type="text" id="res" placeholder="Result (Passed/Failed)" required>
            </div>
            <button type="button" id="resBtn" onclick="submitResult()">रिजल्ट सेभ गर्नुहोस्</button>
        </form>
    </div>

    <div class="box">
        <h3><i class="fas fa-user-tie"></i> नयाँ शिक्षक विवरण थप्नुहोस्</h3>
        <form id="teacherForm">
            <div class="grid">
                <input type="text" id="tName" placeholder="शिक्षकको नाम" required>
                <input type="text" id="tDes" placeholder="पद (उदा: सहायक प्रधानाध्यापक)" required>
                <input type="text" id="tPhoto" style="grid-column: span 2;" placeholder="फोटोको 'Direct Link' (उदा: https://i.ibb.co/...jpg)" required>
            </div>
            <button type="button" id="tBtn" class="btn-teacher" onclick="submitTeacher()">शिक्षक थप्नुहोस्</button>
        </form>
    </div>
</div>

<script>
    // गुगल एप्स स्क्रिप्ट Web App URL
    const webAppUrl = "https://script.google.com/macros/s/AKfycbzQJC7i7BZ8GDGAButj2CiYE6bc4-ccVV6zwzXVgEf9LdejNEpKn6UqVLxqA89NvdaXhA/exec";

    // १. मुख्य टिकर अपडेट फङ्ग्सन
    async function updateTicker() {
        const btn = document.getElementById('tickBtn');
        const text = document.getElementById('tickerText').value;
        if(!text) return alert("कृपया टिकर टेक्स्ट लेख्नुहोस्।");

        const formData = {
            action: "updateTicker",
            ticker: text
        };
        btn.innerText = "अपडेट हुँदैछ..."; btn.disabled = true;
        try {
            await fetch(webAppUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify(formData) });
            alert("मुख्य स्क्रोलिङ सूचना सफलतापूर्वक अपडेट भयो!");
            document.getElementById('tickerForm').reset();
        } catch(e) { alert("त्रुटि भयो!"); } finally { btn.innerText = "टिकर सूचना अपडेट गर्नुहोस"; btn.disabled = false; }
    }

    // २. सूचना बोर्डमा नयाँ नोटिस थप्ने फङ्ग्सन
    async function submitNotice() {
        const btn = document.getElementById('notBtn');
        const formData = {
            action: "addNotice",
            month: document.getElementById('nMonth').value,
            day: document.getElementById('nDay').value,
            title: document.getElementById('nTitle').value,
            content: document.getElementById('nContent').value
        };
        if(!formData.month || !formData.day || !formData.title) return alert("महिना, गते र शीर्षक अनिवार्य भर्नुहोस्।");

        btn.innerText = "पोस्ट हुँदैछ..."; btn.disabled = true;
        try {
            await fetch(webAppUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify(formData) });
            alert("नयाँ सूचना सफलतापूर्वक बोर्डमा पोस्ट भयो!");
            document.getElementById('noticeForm').reset();
        } catch(e) { alert("त्रुटि भयो!"); } finally { btn.innerText = "सूचना बोर्डमा पोस्ट गर्नुहोस"; btn.disabled = false; }
    }

    // ३. विद्यार्थी रिजल्ट सेभ गर्ने फङ्ग्सन
    async function submitResult() {
        const btn = document.getElementById('resBtn');
        const formData = {
            action: "addResult",
            symbol: document.getElementById('sym').value,
            class: document.getElementById('class').value,
            name: document.getElementById('name').value,
            english: document.getElementById('eng').value,
            math: document.getElementById('math').value,
            science: document.getElementById('sci').value,
            nepali: document.getElementById('nep').value,
            gpa: document.getElementById('gpa').value,
            result: document.getElementById('res').value
        };
        if(!formData.symbol || !formData.class || !formData.name) return alert("सिम्बोल, कक्षा र नाम अनिवार्य छ।");

        btn.innerText = "सेभ हुँदैछ..."; btn.disabled = true;
        try {
            await fetch(webAppUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify(formData) });
            alert("रिजल्ट सफलतापूर्वक सेभ भयो!");
            document.getElementById('resultForm').reset();
        } catch(e) { alert("त्रुटि भयो!"); } finally { btn.innerText = "रिजल्ट सेभ गर्नुहोस्"; btn.disabled = false; }
    }

    // ४. शिक्षक विवरण थप्ने फङ्ग्सन (GET Method फिक्स गरिएको ताकि फोटो सुरक्षित सेभ होस्)
    async function submitTeacher() {
        const btn = document.getElementById('tBtn');
        const name = encodeURIComponent(document.getElementById('tName').value);
        const designation = encodeURIComponent(document.getElementById('tDes').value);
        const photoUrl = encodeURIComponent(document.getElementById('tPhoto').value);

        if(!name || !designation || !photoUrl) return alert("सबै विवरण र फोटोको लिङ्क भर्नुहोस्।");

        btn.innerText = "थपिँदैछ..."; btn.disabled = true;
        
        const fullUrl = `${webAppUrl}?action=updateTeacher&name=${name}&designation=${designation}&photoUrl=${photoUrl}`;

        try {
            await fetch(fullUrl);
            alert("शिक्षक विवरण सफलतापूर्वक थपियो!");
            document.getElementById('teacherForm').reset();
        } catch(e) { 
            alert("शिक्षक थप्ने प्रक्रिया पूरा भयो! कृपया मुख्य साइटमा चेक गर्नुहोस्।");
            document.getElementById('teacherForm').reset();
        } finally { 
            btn.innerText = "शिक्षक थप्नुहोस्"; 
            btn.disabled = false; 
        }
    }
</script>
</body>
</html>
